<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Pass Payment</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f5f7fb; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 50px; display: none; }
        .profile-section { display: flex; align-items: center; gap: 15px; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 25px; }
        .profile-section img { width: 50px; height: 50px; border-radius: 50%; }
        .profile-section h3 { margin: 0; color: #333; }
        .profile-section p { margin: 5px 0 0 0; color: #666; font-size: 14px; }
        .pass-card { border: 2px solid #4285F4; border-radius: 8px; padding: 20px; text-align: center; background: #f8faff; }
        .price { font-size: 32px; font-weight: bold; color: #222; margin: 15px 0; }
        .pay-btn { background: #2ecc71; color: white; border: none; padding: 14px 28px; font-size: 18px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; transition: background 0.2s; }
        .pay-btn:hover { background: #27ae60; }
    </style>
</head>
<body>

<div id="appContainer" class="container">
    <div class="profile-section">
        <img id="userAvatar" src="" alt="Avatar">
        <div>
            <h3 id="userName">Loading...</h3>
            <p id="userEmail"></p>
        </div>
    </div>

    <div class="pass-card">
        <h2>Standard Entry Pass</h2>
        <p>Access to all core technical tracks and presentation sessions.</p>
        <div class="price">₹500</div>
        <button class="pay-btn" onclick="initiatePayment(500)">Purchase The Pass 500</button>
    </div>
</div>

<script>
    let loggedInUser = null;

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');
        const email = urlParams.get('email');
        const avatar = urlParams.get('avatar');

        if (name && email && avatar) {
            loggedInUser = {
                name: decodeURIComponent(name),
                email: decodeURIComponent(email),
                avatar: decodeURIComponent(avatar)
            };

            document.getElementById('userName').innerText = loggedInUser.name;
            document.getElementById('userEmail').innerText = loggedInUser.email;
            document.getElementById('userAvatar').src = loggedInUser.avatar;
            document.getElementById('appContainer').style.display = 'block';
        } else {
            window.location.href = 'index.html';
        }
    };

    async function initiatePayment(amountValue) {
        try {
            // Sends {"amount": 500} directly to the backend over the network payload pipe
            const response = await fetch('https://urlz.site/create-order', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ amount: amountValue }) 
            });
            
            const order = await response.json();

            const config = {
                "key": "rzp_test_T9poNYf9vB840A", 
                "amount": amountValue * 100, // Explicitly reads what your backend generated
                "currency": order.currency,
                "name": "Event Portal",
                "description": "Standard Entry Pass",
                "order_id": order.id,
                "handler": function (res) {
                    window.location.href = "success.html?payment_id=" + res.razorpay_payment_id;
                },
                "prefill": {
                    "name": loggedInUser ? loggedInUser.name : "",
                    "email": loggedInUser ? loggedInUser.email : "",
                    "contact": ""
                },
                "modal": {
                    "ondismiss": function() {
                        window.location.href = "error.html?reason=Payment cancelled by user";
                    }
                }
            };

            const rzp = new Razorpay(config);

            rzp.on('payment.failed', function (response) {
                window.location.href = "error.html?reason=" + encodeURIComponent(response.error.description);
            });

            rzp.open();
        } catch (error) {
            console.error("Payment setup handoff failed:", error);
            window.location.href = "error.html?reason=Could not initialize payment window";
        }
    }
</script>
</body>
</html>
