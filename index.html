<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Event Portal</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f5f7fb; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; max-width: 400px; width: 100%; }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; font-size: 14px; }
        .google-btn { display: flex; align-items: center; justify-content: center; background: #4285F4; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: 600; border-radius: 6px; cursor: pointer; text-decoration: none; width: 100%; box-sizing: border-box; transition: background 0.2s; }
        .google-btn:hover { background: #357ae8; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Welcome Portal</h2>
    <p>Please sign in with your Google account to manage passes and complete payments.</p>
    <a href="https://urlz.site/auth/google" class="google-btn">Sign in with Google</a>
</div>

</body>
</html>
