<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f5f7fb; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; max-width: 450px; width: 100%; }
        .icon { font-size: 50px; color: #2ecc71; margin-bottom: 20px; }
        h2 { color: #333; margin: 0 0 10px 0; }
        p { color: #666; font-size: 15px; line-height: 1.5; margin-bottom: 25px; }
        .receipt-box { background: #f8faff; border: 1px dashed #cbd5e1; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 14px; color: #475569; margin-bottom: 30px; word-break: break-all; }
        .btn { display: inline-block; background: #4285F4; color: white; text-decoration: none; padding: 12px 24px; font-weight: 600; border-radius: 6px; transition: background 0.2s; }
        .btn:hover { background: #357ae8; }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">✓</div>
    <h2>Payment Successful!</h2>
    <p>Thank you for your purchase. An official receipt has been generated and sent to your registered email address.</p>
    
    <div class="receipt-box">
        Payment ID: <span id="paymentIdDisplay">Loading...</span>
    </div>

    <a href="pass-payment.html" class="btn">Back to Dashboard</a>
</div>

<script>
    // Extract the payment_id parameter from the browser's URL bar
    const urlParams = new URLSearchParams(window.location.search);
    const paymentId = urlParams.get('payment_id');

    // Display it cleanly inside the HTML layout template
    if (paymentId) {
        document.getElementById('paymentIdDisplay').innerText = paymentId;
    } else {
        document.getElementById('paymentIdDisplay').innerText = "N/A (Direct Access)";
    }
</script>

</body>
</html>
